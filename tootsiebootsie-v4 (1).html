// Hills
[[-8,-4,.12,.04,.22],[8,3,.1,.02,.2],[0,-9,.14,.04,.24],[-5,6,.1,.02,.18],[7,-5,.08,.01,.15]].forEach(([x,z,r,g,b],i)=>{
const m=new THREE.Mesh(new THREE.SphereGeometry(3.5+i*.3,16,12),new THREE.MeshStandardMaterial({color:new THREE.Color(r,g,b),roughness:1,emissive:new THREE.Color(r*.4,g*.4,b*.4)}));
m.position.set(x,-2.5,z);m.scale.y=.45;scene.add(m);});

// Crystal shards
for(let i=0;i<8;i++){const a=(i/8)*Math.PI*2,r=7+Math.random()*3,h=.8+Math.random()*1.4;
const m=new THREE.Mesh(new THREE.CylinderGeometry(.04,.18+Math.random()*.1,h,6),new THREE.MeshStandardMaterial({color:0x6d28d9,emissive:0x3b0764,emissiveIntensity:.6,roughness:.1,metalness:.4,transparent:true,opacity:.75}));
m.position.set(Math.cos(a)*r,-1.2+h/2,Math.sin(a)*r);m.rotation.x=(Math.random()-.5)*.3;m.rotation.z=(Math.random()-.5)*.3;scene.add(m);}

// Particles
const pGeo=new THREE.BufferGeometry(),pN=250,pPos=new Float32Array(pN*3),pVel=new Float32Array(pN*3);
for(let i=0;i<pN;i++){pPos[i*3]=(Math.random()-.5)*18;pPos[i*3+1]=Math.random()*8;pPos[i*3+2]=(Math.random()-.5)*18;pVel[i*3]=(Math.random()-.5)*.004;pVel[i*3+1]=Math.random()*.006+.002;pVel[i*3+2]=(Math.random()-.5)*.004;}
pGeo.setAttribute('position',new THREE.BufferAttribute(pPos,3));
const particles=new THREE.Points(pGeo,new THREE.PointsMaterial({color:0xc4b5fd,size:.06,transparent:true,opacity:.55}));
scene.add(particles);

// BUBBLES
const BCOLS={local:{base:0xa855f7,em:0x7c3aed},trip:{base:0xec4899,em:0xbe185d},hike:{base:0x4ade80,em:0x15803d}};
const BPOS={local:[new THREE.Vector3(-3.8,.8,-1.2),new THREE.Vector3(3.5,.6,-1.5),new THREE.Vector3(-2.5,.5,2.8),new THREE.Vector3(2.8,.9,2.5),new THREE.Vector3(0,1,3.8)],trip:[new THREE.Vector3(-3.5,.8,0),new THREE.Vector3(0,.9,-2.8),new THREE.Vector3(3.5,.8,0),new THREE.Vector3(-2.2,.7,2.5),new THREE.Vector3(2.5,.7,2.2)],hike:[new THREE.Vector3(-3,.8,0),new THREE.Vector3(0,.8,-2.5),new THREE.Vector3(3,.8,0)]};
let bubbles=[];

function clearBubbles(){bubbles.forEach(b=>{scene.remove(b.mesh);scene.remove(b.glow);scene.remove(b.shine);scene.remove(b.shadow);});bubbles=[];}

function spawnBubbles(places){
  clearBubbles();
  const c=BCOLS[mode],pos=BPOS[mode];
  places.forEach((place,i)=>{
    if(!pos[i])return;
    const p=pos[i].clone();
    const mesh=new THREE.Mesh(new THREE.SphereGeometry(.72,32,32),new THREE.MeshPhysicalMaterial({color:c.base,emissive:c.em,emissiveIntensity:.35,roughness:.05,metalness:0,transmission:.55,thickness:1.2,transparent:true,opacity:.88,side:THREE.DoubleSide}));
    mesh.position.copy(p);mesh.userData={place};scene.add(mesh);
    const glow=new THREE.Mesh(new THREE.SphereGeometry(.88,24,24),new THREE.MeshBasicMaterial({color:c.base,transparent:true,opacity:.1,side:THREE.BackSide,depthWrite:false}));
    glow.position.copy(p);scene.add(glow);
    const shine=new THREE.Mesh(new THREE.SphereGeometry(.22,12,12),new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:.28}));
    shine.position.set(p.x+.18,p.y+.2,p.z+.32);scene.add(shine);
    const shadow=new THREE.Mesh(new THREE.CircleGeometry(.6,24),new THREE.MeshBasicMaterial({color:c.em,transparent:true,opacity:.22,depthWrite:false}));
    shadow.rotation.x=-Math.PI/2;shadow.position.set(p.x,-1.15,p.z);scene.add(shadow);
    const offset=Math.random()*Math.PI*2;
    const b={mesh,glow,shine,shadow,place,offset,baseY:p.y,sT:0,sC:0};
    bubbles.push(b);
    setTimeout(()=>{const found=bubbles.find(x=>x.mesh===mesh);if(found)found.sT=1;},i*120+80);
  });
}

function getPool(){if(mode==='local')return FALLBACK.local;if(mode==='hike')return FALLBACK.hike;return FALLBACK.trip.filter(t=>t.driveMin<=radius);}

// ORBIT
let isDrag=false,lastX=0,lastY=0,rotY=0,rotX=.15,autoRot=true;
const target=new THREE.Vector3(0,0,0);
let tapX=0,tapY=0,tapT=0;

canvas.addEventListener('pointerdown',e=>{isDrag=true;lastX=e.clientX;lastY=e.clientY;tapX=e.clientX;tapY=e.clientY;tapT=Date.now();autoRot=false;clearTimeout(canvas._rt);canvas._rt=setTimeout(()=>autoRot=true,3500);});
window.addEventListener('pointermove',e=>{if(!isDrag)return;rotY+=(e.clientX-lastX)*.005;rotX+=(e.clientY-lastY)*.003;rotX=Math.max(-.2,Math.min(.6,rotX));lastX=e.clientX;lastY=e.clientY;});
window.addEventListener('pointerup',e=>{isDrag=false;if(Date.now()-tapT<300&&Math.abs(e.clientX-tapX)<10&&Math.abs(e.clientY-tapY)<10)pickBubble(e.clientX,e.clientY);});
canvas.addEventListener('touchstart',e=>{const t=e.touches[0];isDrag=true;lastX=tapX=t.clientX;lastY=tapY=t.clientY;tapT=Date.now();autoRot=false;clearTimeout(canvas._rt);canvas._rt=setTimeout(()=>autoRot=true,3500);},{passive:true});
window.addEventListener('touchmove',e=>{if(!isDrag)return;const t=e.touches[0];rotY+=(t.clientX-lastX)*.005;rotX+=(t.clientY-lastY)*.003;rotX=Math.max(-.2,Math.min(.6,rotX));lastX=t.clientX;lastY=t.clientY;},{passive:true});
window.addEventListener('touchend',e=>{isDrag=false;if(e.changedTouches.length){const t=e.changedTouches[0];if(Date.now()-tapT<300&&Math.abs(t.clientX-tapX)<12&&Math.abs(t.clientY-tapY)<12)pickBubble(t.clientX,t.clientY);}});

const ray=new THREE.Raycaster(),mouse=new THREE.Vector2();
function pickBubble(cx,cy){mouse.x=(cx/innerWidth)*2-1;mouse.y=-(cy/innerHeight)*2+1;ray.setFromCamera(mouse,camera);const hits=ray.intersectObjects(bubbles.map(b=>b.mesh));if(hits.length){openPanel(hits[0].object.userData.place);autoRot=false;clearTimeout(canvas._rt);canvas._rt=setTimeout(()=>autoRot=true,10000);}}

// ANIMATE
const clock=new THREE.Clock();
(function animate(){requestAnimationFrame(animate);const t=clock.getElapsedTime();
if(autoRot)rotY+=.003;
const r=11,cx=Math.sin(rotY)*r*Math.cos(rotX),cz=Math.cos(rotY)*r*Math.cos(rotX),cy2=r*Math.sin(rotX)+2;
camera.position.lerp(new THREE.Vector3(cx,cy2,cz),.06);camera.lookAt(target);
rimLight.intensity=2.2+Math.sin(t*1.1)*.6;rimLight.position.set(Math.sin(t*.4)*3,4+Math.sin(t*.6),Math.cos(t*.4)*3);
groundGlow.intensity=1.0+Math.sin(t*.8)*.4;
const pp=pGeo.attributes.position.array;
for(let i=0;i<pN;i++){pp[i*3]+=pVel[i*3];pp[i*3+1]+=pVel[i*3+1];pp[i*3+2]+=pVel[i*3+2];if(pp[i*3+1]>8){pp[i*3+1]=-1;pp[i*3]=(Math.random()-.5)*18;pp[i*3+2]=(Math.random()-.5)*18;}}
pGeo.attributes.position.needsUpdate=true;
bubbles.forEach(b=>{b.sC+=(b.sT-b.sC)*.1;const s=b.sC,sq=1+Math.sin(t*2.2+b.offset)*.04;
b.mesh.scale.set(s*sq,s/sq,s*sq);b.glow.scale.set(s*sq,s/sq,s*sq);b.shine.scale.setScalar(s);
b.mesh.position.y=b.baseY+Math.sin(t*1.1+b.offset)*.22;b.glow.position.y=b.mesh.position.y;b.shine.position.y=b.mesh.position.y+.2;
b.mesh.rotation.y=t*.25+b.offset;b.glow.material.opacity=.08+Math.sin(t*1.8+b.offset)*.06;b.shadow.material.opacity=s*.22;});
renderer.render(scene,camera);})();

// MODE
window.setMode=async function(m){mode=m;['local','trip','hike'].forEach(id=>document.getElementById('btn-'+id).className='mbtn'+(m===id?' active':''));
document.getElementById('radius-bar').className=m==='trip'?'visible':'';
renderer.setClearColor(m==='hike'?0x0a1f0f:0x1a1035,1);scene.fog.color.setHex(m==='hike'?0x0a1f0f:0x1a1035);
document.getElementById('hint').textContent=m==='hike'?'🥾 Tap a trail bubble':'🌍 Drag to spin · Tap a bubble';
closePanel();spawnBubbles(getPool());
if(userLat&&API){let data=null;
if(m==='local')data=await fAPI('/api/discover','POST',{lat:userLat,lng:userLng,city:cityName,state:userState,mode:'local',radius:60,count:5});
if(m==='trip')data=await fAPI('/api/day-trips','POST',{lat:userLat,lng:userLng,city:cityName,state:userState,mode:'trip',radius,count:5});
if(m==='hike')data=await fAPI('/api/trails?lat='+userLat+'&lng='+userLng);
const pl=data?.places||(Array.isArray(data)?data:[]);
if(pl.length){FALLBACK[m]=pl.map((p,i)=>({...FALLBACK[m][i%FALLBACK[m].length],...p,type:m}));spawnBubbles(getPool());toast('✨ Real discoveries loaded!');}}};

window.setRadius=function(r){radius=r;document.querySelectorAll('.rpill').forEach(p=>{const v=p.textContent.includes('30')?30:p.textContent.includes('1')?60:120;p.className='rpill'+(v===r?' active':'');});spawnBubbles(getPool());};

// PANEL
function openPanel(place){
  activePlace=place;
  const saved=savedPlaces.find(p=>p.id===place.id);
  const tags=(place.tags||[]).map(t=>'<span class="sh-tag">'+t+'</span>').join('');
  const buzz=Math.round((place.buzz||.7)*100);
  const tc=mode==='local'?'#a855f7':mode==='trip'?'#ec4899':'#4ade80';
  const tb=mode==='local'?'rgba(168,85,247,.12)':mode==='trip'?'rgba(236,72,153,.12)':'rgba(74,222,128,.12)';
  const tl=mode==='local'?'Local Gem':mode==='trip'?'Day Trip':'Trail';
  const stars='★'.repeat(Math.round(place.rating||4))+'☆'.repeat(5-Math.round(place.rating||4));
  let extra='';
  if(mode==='hike'&&place.trail){const tr=place.trail,pips='●'.repeat(tr.diff)+'○'.repeat(5-tr.diff);extra='<div class="sh-stats"><div class="sh-stat"><div class="sh-stat-v">'+tr.d+'</div><div class="sh-stat-l">Distance</div></div><div class="sh-stat"><div class="sh-stat-v">'+tr.e+'</div><div class="sh-stat-l">Elevation</div></div><div class="sh-stat"><div class="sh-stat-v" style="font-size:11px">'+pips+'</div><div class="sh-stat-l">Difficulty</div></div></div>';}
  else if(mode==='trip')extra='<div class="sh-drive">🚗 '+place.dist+'</div>';
  else extra='<div class="sh-buzz-row"><span style="font-size:9px;color:#8c7f74;text-transform:uppercase;letter-spacing:.5px">🔥 Buzz</span><div class="sh-buzz-track"><div class="sh-buzz-fill" style="width:'+buzz+'%;background:'+tc+'"></div></div><span style="font-size:10px;color:#8c7f74;font-weight:600">'+buzz+'%</span><span class="sh-stars">'+stars+'</span></div>';
  const photo=place.photo_url?'<img src="'+place.photo_url+'" style="width:100%;height:150px;object-fit:cover;border-radius:14px;margin-bottom:14px;" onerror="this.style.display=\'none\'"/>':'<div class="sh-emoji">'+place.emoji+'</div>';
  const openB=place.open_now!==undefined?'<span class="'+(place.open_now?'open-yes':'open-no')+'">'+( place.open_now?'● Open now':'● Closed')+'</span>':'';
  const traces=place.traces||[];
  const wall=traces.length?traces.slice(0,6).map(t=>'<img class="trace-thumb" src="'+t.photo_url+'" onerror="this.style.display=\'none\'">').join('')+(traces.length<6?'<div class="trace-empty" onclick="openTC(\''+place.name+'\',\''+mode+'\')">+</div>':''):'<div class="trace-empty" onclick="openTC(\''+place.name+'\',\''+mode+'\')">📸</div><div class="trace-empty" style="opacity:.4">📸</div><div class="trace-empty" style="opacity:.15">📸</div>';
  const traceSec='<div style="border-top:1px solid rgba(60,50,40,.1);padding-top:12px;margin-top:4px;margin-bottom:14px"><div class="trace-count">📍 '+(traces.length?'<strong>'+traces.length+'</strong> trace'+(traces.length!==1?'s':'')+' from real visitors':'Be the first to leave a Trace')+'</div><div class="traces-wall">'+wall+'</div><button class="btn-trace" onclick="openTC(\''+place.name+'\',\''+mode+'\')">+ Leave a Trace — one photo, one sentence</button></div>';
  document.getElementById('panel-content').innerHTML=photo+'<span class="sh-type" style="background:'+tb+';color:'+tc+'">'+tl+'</span><div class="sh-name">'+place.name+'</div>'+openB+'<div class="sh-why">'+place.why+'</div><div class="sh-tip">'+place.tip+'</div><div class="sh-tags">'+tags+'</div>'+extra+traceSec+'<div class="sh-actions"><button class="sh-save '+(saved?'saved':'')+'" onclick="savePlace('+place.id+')">'+(saved?'✓ Saved':'+ Save to My Day')+'</button><button class="sh-close" onclick="closePanel()">✕</button></div>';
  document.getElementById('panel-overlay').classList.add('open');
  autoRot=false;clearTimeout(canvas._rt);canvas._rt=setTimeout(()=>autoRot=true,10000);
}
window.closePanel=function(){document.getElementById('panel-overlay').classList.remove('open');clearTimeout(canvas._rt);canvas._rt=setTimeout(()=>autoRot=true,3000);};
window.savePlace=function(id){const all=[...FALLBACK.local,...FALLBACK.trip,...FALLBACK.hike],place=all.find(p=>p.id===id);if(!place)return;if(!savedPlaces.find(p=>p.id===id)){savedPlaces.push(place);const b=document.getElementById('saved-bar');b.style.display='block';b.textContent='✦ My Day: '+savedPlaces.map(p=>p.emoji+' '+p.name.split(' ')[0]).join(' · ');toast('✓ Saved — '+place.name);}closePanel();};

// TRACES
window.openTC=function(name,type){if(!currentUser&&sbClient){toast('Sign in to leave a Trace');handleAuth();return;}traceTarget={place_name:name,place_type:type||'local',lat:userLat||0,lng:userLng||0};document.getElementById('tc-name').textContent=name;document.getElementById('tc-text').value='';document.getElementById('tc-count').textContent='0';document.getElementById('tc-go').disabled=true;document.getElementById('tc-preview').style.display='none';document.getElementById('tc-ph').style.display='flex';tcFile=null;document.getElementById('trace-composer').classList.add('open');closePanel();};
window.closeTC=()=>document.getElementById('trace-composer').classList.remove('open');
document.getElementById('tc-file').addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;tcFile=f;const pr=document.getElementById('tc-preview');pr.src=URL.createObjectURL(f);pr.style.display='block';document.getElementById('tc-ph').style.display='none';chkTC();e.target.value='';});
document.getElementById('tc-text').addEventListener('input',e=>{document.getElementById('tc-count').textContent=e.target.value.length;chkTC();});
function chkTC(){document.getElementById('tc-go').disabled=!(tcFile&&document.getElementById('tc-text').value.trim().length>=5);}
window.submitTrace=async function(){const s=document.getElementById('tc-text').value.trim();if(!tcFile||!s||!traceTarget)return;const btn=document.getElementById('tc-go');btn.disabled=true;btn.textContent='Saving…';try{const r=await fAPI('/api/traces','POST',{...traceTarget,sentence:s},'Bearer '+(userJwt||''));if(r?.trace_id){const fd=new FormData();fd.append('file',tcFile);await fetch('/api/traces/'+r.trace_id+'/photo',{method:'POST',headers:{Authorization:'Bearer '+(userJwt||'')},body:fd});}toast('✨ Trace left!');closeTC();}catch(e){toast('Could not save trace');btn.disabled=false;btn.textContent='Leave Trace ✦';}};

// AUTH
function initSB(){try{sbClient=supabase.createClient(SB_URL,SB_ANON);sbClient.auth.onAuthStateChange((_,s)=>{currentUser=s?.user||null;userJwt=s?.access_token||null;upAuthUI();});sbClient.auth.getSession().then(({data})=>{currentUser=data.session?.user||null;userJwt=data.session?.access_token||null;upAuthUI();});}catch(e){}}
function upAuthUI(){const l=document.getElementById('auth-label'),av=document.getElementById('auth-avatar');if(currentUser){l.textContent=currentUser.user_metadata?.full_name?.split(' ')[0]||'You';const s=currentUser.user_metadata?.avatar_url;if(s){av.src=s;av.style.display='block';}}else{l.textContent='Sign in';av.style.display='none';}}
window.handleAuth=async function(){if(!sbClient){toast('Sign in available once deployed');return;}if(currentUser){await sbClient.auth.signOut();toast('Signed out');}else await sbClient.auth.signInWithOAuth({provider:'google',options:{redirectTo:location.href}});};

// API
async function fAPI(path,method='GET',body=null,auth=null){try{const o={method,headers:{'Content-Type':'application/json'}};if(auth)o.headers['Authorization']=auth;if(body&&method!=='GET')o.body=JSON.stringify(body);const r=await fetch(path,o);return r.ok?r.json():null;}catch{return null;}}

// PWA
function initPWA(){if('serviceWorker'in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{});window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredInstall=e;setTimeout(()=>{if(deferredInstall&&!matchMedia('(display-mode:standalone)').matches)document.getElementById('install-banner').classList.add('visible');},45000);});window.addEventListener('appinstalled',()=>{toast('✓ Installed!');hideInstallBanner();});}
window.triggerInstall=async function(){if(!deferredInstall){toast('Use "Add to Home Screen" in your browser');return;}deferredInstall.prompt();const{outcome}=await deferredInstall.userChoice;if(outcome==='accepted')toast('Installing…');deferredInstall=null;hideInstallBanner();};
window.hideInstallBanner=()=>document.getElementById('install-banner').classList.remove('visible');

// UTILS
function setP(p,m){document.getElementById('lprog').style.width=p+'%';document.getElementById('lmsg').textContent=m;}
function hideLanding(){const l=document.getElementById('loading');l.classList.add('out');setTimeout(()=>l.style.display='none',800);}
window.toast=function(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2600);};

// INIT
async function init(){
  initSB();initPWA();spawnBubbles(getPool());setP(20,'Building world…');
  const mx=setTimeout(hideLanding,9000);
  if(!navigator.geolocation){clearTimeout(mx);setP(100,'Demo mode');setTimeout(hideLanding,500);return;}
  setP(35,'Detecting location…');
  navigator.geolocation.getCurrentPosition(async pos=>{
    clearTimeout(mx);userLat=pos.coords.latitude;userLng=pos.coords.longitude;
    setP(50,'Finding your city…');
    const geo=await fAPI('/api/geocode?lat='+userLat+'&lng='+userLng);
    if(geo?.city){cityName=geo.city;userState=geo.state||'';document.getElementById('city-tag').textContent='Day Tripper · '+cityName;}
    setP(68,'Fetching discoveries…');
    const[lR,tR,hR]=await Promise.allSettled([fAPI('/api/discover','POST',{lat:userLat,lng:userLng,city:cityName,state:userState,mode:'local',radius:60,count:5}),fAPI('/api/day-trips','POST',{lat:userLat,lng:userLng,city:cityName,state:userState,mode:'trip',radius:60,count:5}),fAPI('/api/trails?lat='+userLat+'&lng='+userLng)]);
    const lp=lR.value?.places||[],tp=tR.value?.places||[],hp=hR.value?.places||(Array.isArray(hR.value)?hR.value:[]);
    if(lp.length)FALLBACK.local=lp.map((p,i)=>({...FALLBACK.local[i%5],...p,type:'local'}));
    if(tp.length)FALLBACK.trip=tp.map((p,i)=>({...FALLBACK.trip[i%5],...p,type:'trip'}));
    if(hp.length)FALLBACK.hike=hp.map((p,i)=>({...FALLBACK.hike[i%3],...p,type:'hike'}));
    spawnBubbles(getPool());setP(100,'Ready!');setTimeout(hideLanding,400);
    setTimeout(()=>toast((lp.length||tp.length||hp.length)?'✨ Real discoveries for '+cityName+'!':'💡 Demo mode — add API keys'),800);
  },()=>{clearTimeout(mx);setP(100,'Demo mode');setTimeout(hideLanding,500);toast('📍 Enable location for real nearby discoveries');},{enableHighAccuracy:true,timeout:10000});
}
window.addEventListener('load',init);
</script>
</body>
</html>
