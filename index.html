<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>TootsieBootsie Day Tripper</title>

<!-- PWA manifest -->
<link rel="manifest" href="/manifest.json"/>

<!-- iOS PWA support -->
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="TootsieBootsie"/>
<link rel="apple-touch-icon" href="/icons/icon-152.png"/>
<link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png"/>
<link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png"/>

<!-- iOS splash screens -->
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>

<!-- Android / Chrome -->
<meta name="theme-color" content="#0e0b08"/>
<meta name="mobile-web-app-capable" content="yes"/>

<!-- SEO & sharing -->
<meta name="description" content="Discover your perfect day — local gems, day trips, and trails near you."/>
<meta property="og:title" content="TootsieBootsie Day Tripper"/>
<meta property="og:description" content="Swipe through discoveries, save your day, leave a Trace."/>
<meta property="og:type" content="website"/>
<meta property="og:url" content="https://tootsiebootsie.com"/>
<meta name="twitter:card" content="summary_large_image"/>

<!-- Favicon -->
<link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-96.png"/>
<link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-72.png"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --cream:   #faf6ef;
  --ink:     #1a1612;
  --ink2:    #3d3530;
  --muted:   #8c7f74;
  --border:  rgba(60,50,40,.13);
  --local:   #c45c2e;
  --trip:    #2e6b5e;
  --hike:    #3d5a8a;
}
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #0e0b08;
  font-family: 'DM Sans', sans-serif;
  touch-action: none;
  user-select: none;
}

/* ── CSS3D card face ─────────────────────────────────────── */
.card-face {
  width: 300px;
  height: 420px;
  background: var(--cream);
  border-radius: 22px;
  overflow: hidden;
  box-shadow: 0 30px 80px rgba(0,0,0,.45), 0 2px 8px rgba(0,0,0,.2);
  position: absolute;
  cursor: grab;
  will-change: transform;
  backface-visibility: hidden;
}
.card-face:active { cursor: grabbing; }
.card-emoji {
  width: 100%; height: 170px;
  display: flex; align-items: center; justify-content: center;
  font-size: 72px;
  flex-shrink: 0;
  position: relative;
}
.card-emoji::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0; height: 40px;
  background: linear-gradient(transparent, var(--cream));
}
.card-content { padding: 14px 18px 18px; }
.card-type-pill {
  display: inline-block;
  font-size: 9px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1px;
  padding: 3px 10px; border-radius: 10px;
  margin-bottom: 8px;
}
.card-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px; font-weight: 700;
  color: var(--ink); line-height: 1.2;
  margin-bottom: 7px;
}
.card-why {
  font-size: 12px; color: var(--ink2);
  line-height: 1.6; margin-bottom: 9px;
}
.card-tip {
  font-size: 11px; color: var(--muted);
  font-style: italic;
  border-left: 2px solid #e0d8ce;
  padding-left: 9px;
  line-height: 1.5;
  margin-bottom: 12px;
}
.card-dist {
  font-size: 11px; color: var(--muted);
  font-weight: 500;
}
.card-buzz-row {
  display: flex; align-items: center; gap: 7px;
  margin-bottom: 10px;
}
.buzz-track {
  flex: 1; height: 3px;
  background: #ede5d8; border-radius: 2px; overflow: hidden;
}
.buzz-fill { height: 100%; border-radius: 2px; }

/* ── Swipe hint arrows ───────────────────────────────────── */
.swipe-hints {
  position: absolute; bottom: 16px;
  left: 0; right: 0;
  display: flex; justify-content: space-between;
  padding: 0 18px;
  pointer-events: none;
}
.hint {
  font-size: 10px; font-weight: 600;
  padding: 4px 10px; border-radius: 10px;
  opacity: 0; transition: opacity .3s;
}
.hint-left  { background: #fee2e2; color: #b91c1c; }
.hint-right { background: #dcfce7; color: #15803d; }
.hint-up    { position: absolute; top: 16px; left: 50%; transform: translateX(-50%); background: #fef3c7; color: #92400e; }

/* ── HUD overlays ────────────────────────────────────────── */
#hud-top {
  position: fixed; top: 0; left: 0; right: 0;
  padding: 20px 22px 14px;
  background: linear-gradient(#0e0b08 60%, transparent);
  z-index: 100; pointer-events: none;
  display: flex; align-items: flex-start; justify-content: space-between;
}
#wordmark {
  font-family: 'Cormorant Garamond', serif;
  font-size: 26px; font-weight: 700; color: #f5ede0;
  letter-spacing: -.5px; line-height: 1;
}
#wordmark em { color: #e8845a; font-style: italic; }
#city-line {
  font-size: 11px; color: rgba(245,237,224,.55);
  font-weight: 500; margin-top: 3px;
  display: flex; align-items: center; gap: 5px;
}
#city-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: #e8845a; flex-shrink: 0;
  animation: blink 2s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

/* Mode toggle */
#mode-toggle {
  display: flex; flex-direction: column; gap: 5px;
  pointer-events: all;
}
.mmode {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 11px; border-radius: 20px;
  font-size: 10px; font-weight: 600;
  cursor: pointer; border: 1px solid rgba(255,255,255,.15);
  background: rgba(255,255,255,.08);
  color: rgba(255,255,255,.5);
  transition: all .2s; letter-spacing: .3px;
  backdrop-filter: blur(8px);
}
.mmode.active { background: rgba(255,255,255,.18); color: #f5ede0; border-color: rgba(255,255,255,.3); }
.mmode .mic { font-size: 14px; }

/* ── HUD bottom ──────────────────────────────────────────── */
#hud-bottom {
  position: fixed; bottom: 0; left: 0; right: 0;
  padding: 0 22px max(20px, env(safe-area-inset-bottom));
  background: linear-gradient(transparent, #0e0b08 60%);
  z-index: 100;
  display: flex; flex-direction: column; gap: 10px;
}

/* Gesture guide */
#gesture-guide {
  display: flex; justify-content: center; gap: 20px;
  padding-bottom: 4px;
}
.gest {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  opacity: .45;
}
.gest .gicon { font-size: 16px; }
.gest .glabel { font-size: 9px; color: rgba(245,237,224,.7); font-weight: 500; letter-spacing: .3px; }

/* Saved stack */
#saved-stack {
  display: none;
  align-items: center; gap: 10px;
  background: rgba(255,255,255,.1);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,.15);
  border-radius: 14px;
  padding: 10px 16px;
  animation: riseUp .3s cubic-bezier(.34,1.4,.64,1) both;
}
#saved-stack.visible { display: flex; }
@keyframes riseUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
#saved-emojis { display: flex; gap: -4px; }
.saved-emoji {
  width: 28px; height: 28px; border-radius: 50%;
  background: rgba(255,255,255,.15);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; margin-left: -4px;
  border: 1.5px solid rgba(255,255,255,.2);
}
.saved-emoji:first-child { margin-left: 0; }
#saved-label { font-size: 12px; color: rgba(245,237,224,.8); font-weight: 500; flex: 1; }


/* ── Radius bar ──────────────────────────────────────────── */
#radius-bar {
  display: none;
  justify-content: center; gap: 8px;
}
#radius-bar.visible { display: flex; }
.rpill {
  padding: 5px 14px; border-radius: 20px;
  font-size: 10px; font-weight: 600;
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.15);
  color: rgba(255,255,255,.5);
  cursor: pointer; transition: all .2s;
}
.rpill.active { background: rgba(255,255,255,.2); color: #f5ede0; border-color: rgba(255,255,255,.35); }

/* ── Loading ─────────────────────────────────────────────── */
#loading-screen {
  position: fixed; inset: 0;
  background: #0e0b08;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 18px; z-index: 200;
  transition: opacity .6s;
}
#loading-screen.out { opacity: 0; pointer-events: none; }
.ld-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 32px; font-weight: 700; color: #f5ede0;
}
.ld-name em { color: #e8845a; font-style: italic; }
.ld-msg { font-size: 12px; color: rgba(245,237,224,.4); font-weight: 400; }
.ld-dots { display: flex; gap: 7px; }
.ld-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: #e8845a;
  animation: ldBounce .9s ease-in-out infinite;
}
.ld-dot:nth-child(2) { animation-delay: .15s; }
.ld-dot:nth-child(3) { animation-delay: .3s; }
@keyframes ldBounce { 0%,80%,100%{transform:translateY(0);opacity:.3} 40%{transform:translateY(-9px);opacity:1} }

/* ── Toast ───────────────────────────────────────────────── */
#toast {
  position: fixed; top: 88px; left: 50%; transform: translateX(-50%);
  background: rgba(255,255,255,.15); backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,.2);
  color: #f5ede0; border-radius: 20px;
  padding: 8px 18px; font-size: 12px; font-weight: 500;
  z-index: 150; white-space: nowrap;
  opacity: 0; pointer-events: none;
  transition: opacity .25s;
}
#toast.show { opacity: 1; }

/* ── Detail panel ────────────────────────────────────────── */
#detail-panel {
  position: fixed; inset: 0; z-index: 120;
  display: flex; align-items: flex-end;
  opacity: 0; pointer-events: none;
  transition: opacity .3s;
}
#detail-panel.open { opacity: 1; pointer-events: all; }
#detail-backdrop {
  position: absolute; inset: 0;
  background: rgba(0,0,0,.5);
  backdrop-filter: blur(4px);
}
#detail-sheet {
  position: relative; z-index: 1;
  background: var(--cream);
  border-radius: 24px 24px 0 0;
  width: 100%; padding: 24px 22px 40px;
  transform: translateY(100%);
  transition: transform .35s cubic-bezier(.34,1.2,.64,1);
  max-height: 80vh; overflow-y: auto;
}
#detail-panel.open #detail-sheet { transform: translateY(0); }
.sheet-handle {
  width: 36px; height: 4px; border-radius: 2px;
  background: #ddd4c8; margin: 0 auto 18px;
}
.sheet-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 28px; font-weight: 700; color: var(--ink);
  line-height: 1.2; margin-bottom: 6px;
}
.sheet-why { font-size: 14px; color: var(--ink2); line-height: 1.7; margin-bottom: 12px; }
.sheet-tip {
  font-size: 13px; color: var(--muted); font-style: italic;
  border-left: 2px solid #e0d8ce; padding-left: 12px;
  line-height: 1.6; margin-bottom: 16px;
}
.sheet-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 18px; }
.sheet-tag {
  font-size: 11px; color: var(--muted);
  background: white; border: 1px solid var(--border);
  border-radius: 8px; padding: 4px 11px;
}
.sheet-actions { display: flex; gap: 10px; }
.sheet-save {
  flex: 1; padding: 13px; border-radius: 13px;
  background: var(--ink); color: white;
  font-size: 13px; font-weight: 600;
  border: none; cursor: pointer; font-family: 'DM Sans', sans-serif;
  transition: all .18s;
}
.sheet-save.saved { background: var(--trip); }
.sheet-dismiss {
  padding: 13px 18px; border-radius: 13px;
  background: white; border: 1px solid var(--border);
  font-size: 13px; color: var(--muted);
  cursor: pointer; font-family: 'DM Sans', sans-serif;
}

/* ── Install banner ──────────────────────────────────────────── */
#install-banner {
  position: fixed; bottom: 80px; left: 16px; right: 16px;
  background: rgba(244,237,224,.96); backdrop-filter: blur(12px);
  border-radius: 18px; padding: 14px 16px;
  display: none; align-items: center; gap: 12px;
  border: 1px solid rgba(196,92,46,.2);
  box-shadow: 0 8px 32px rgba(0,0,0,.3);
  z-index: 90; animation: riseUp .3s cubic-bezier(.34,1.4,.64,1) both;
}
#install-banner.visible { display: flex; }
#install-banner .ib-icon { font-size: 32px; flex-shrink: 0; }
#install-banner .ib-text { flex: 1; }
#install-banner .ib-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 15px; font-weight: 700; color: var(--ink); margin-bottom: 2px;
}
#install-banner .ib-sub { font-size: 11px; color: var(--muted); }
#install-banner .ib-btn {
  background: var(--ink); color: white; border: none;
  border-radius: 10px; padding: 8px 14px; font-size: 12px;
  font-weight: 700; cursor: pointer; font-family: 'DM Sans', sans-serif;
  white-space: nowrap; flex-shrink: 0;
}
#install-banner .ib-close {
  background: none; border: none; color: var(--muted);
  font-size: 16px; cursor: pointer; flex-shrink: 0; padding: 4px;
}
.traces-wall {
  display: grid; grid-template-columns: repeat(3,1fr);
  gap: 4px; margin: 12px 0;
}
.trace-thumb {
  aspect-ratio: 1; border-radius: 8px;
  object-fit: cover; width: 100%;
  background: #f0ebe3; cursor: pointer;
}
.trace-thumb-empty {
  aspect-ratio: 1; border-radius: 8px;
  background: var(--cream); border: 1px dashed var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; cursor: pointer;
}
.trace-count {
  font-size: 11px; color: var(--muted); margin-bottom: 8px;
  display: flex; align-items: center; gap: 5px;
}
.trace-count strong { color: var(--ink); }

/* Leave a trace button on card */
.btn-trace {
  width: 100%; border: 1.5px dashed var(--border);
  border-radius: 11px; padding: 9px; font-size: 11px;
  font-weight: 600; cursor: pointer; background: transparent;
  color: var(--muted); font-family: 'DM Sans',sans-serif;
  transition: all .18s; margin-top: 6px;
}
.btn-trace:hover { border-color: var(--local); color: var(--local); }

/* Trace composer */
#trace-composer {
  position: fixed; inset: 0; z-index: 150;
  display: flex; align-items: flex-end;
  opacity: 0; pointer-events: none; transition: opacity .3s;
}
#trace-composer.open { opacity: 1; pointer-events: all; }
#trace-bg { position: absolute; inset: 0; background: rgba(0,0,0,.6); backdrop-filter: blur(4px); }
#trace-sheet {
  position: relative; z-index: 1; background: white;
  border-radius: 24px 24px 0 0; width: 100%;
  padding: 20px 22px max(28px,env(safe-area-inset-bottom));
  transform: translateY(100%);
  transition: transform .35s cubic-bezier(.34,1.2,.64,1);
}
#trace-composer.open #trace-sheet { transform: translateY(0); }
.tc-handle { width:36px;height:4px;border-radius:2px;background:#ddd4c8;margin:0 auto 18px; }
.tc-title { font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:var(--ink);margin-bottom:4px; }
.tc-place { font-size:12px;color:var(--muted);margin-bottom:16px; }
#tc-photo-area {
  width:100%;height:160px;border-radius:14px;
  background:var(--cream);border:2px dashed var(--border);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;cursor:pointer;margin-bottom:14px;overflow:hidden;position:relative;
}
#tc-photo-preview { width:100%;height:100%;object-fit:cover;display:none; }
#tc-photo-placeholder { display:flex;flex-direction:column;align-items:center;gap:6px; }
#tc-photo-placeholder span { font-size:32px; }
#tc-photo-placeholder small { font-size:11px;color:var(--muted); }
#tc-sentence {
  width:100%;border:1px solid var(--border);border-radius:11px;
  padding:12px 14px;font-size:14px;font-family:'DM Sans',sans-serif;
  color:var(--ink);resize:none;height:72px;line-height:1.5;
  outline:none;background:white;
}
#tc-sentence:focus { border-color:var(--local); }
.tc-char { font-size:10px;color:var(--muted);text-align:right;margin-top:4px;margin-bottom:14px; }
.tc-actions { display:flex;gap:10px; }
.tc-submit {
  flex:1;padding:13px;border-radius:13px;background:var(--ink);
  color:white;border:none;font-size:13px;font-weight:700;
  cursor:pointer;font-family:'DM Sans',sans-serif;transition:opacity .15s;
}
.tc-submit:disabled { opacity:.45;cursor:not-allowed; }
.tc-cancel { padding:13px 18px;border-radius:13px;background:white;
  border:1px solid var(--border);font-size:13px;color:var(--muted);
  cursor:pointer;font-family:'DM Sans',sans-serif; }

/* Auth button */
#auth-btn {
  position:fixed;top:18px;left:18px;z-index:25;
  background:rgba(255,255,255,.12);backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,.2);border-radius:22px;
  padding:7px 14px;font-size:11px;font-weight:600;
  color:rgba(255,255,255,.8);cursor:pointer;
  display:flex;align-items:center;gap:6px;
  font-family:'DM Sans',sans-serif;transition:all .2s;
}
#auth-btn:hover { background:rgba(255,255,255,.2); }
#auth-avatar { width:20px;height:20px;border-radius:50%;object-fit:cover;display:none; }

</style>
</head>
<body>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<!-- Auth button -->
<button id="auth-btn" onclick="handleAuth()">
  <img id="auth-avatar" src="" alt=""/>
  <span id="auth-label">Sign in</span>
</button>

<!-- Loading -->
<div id="loading-screen">
  <div class="ld-name">Tootsie<em>Bootsie</em></div>
  <div class="ld-dots"><div class="ld-dot"></div><div class="ld-dot"></div><div class="ld-dot"></div></div>
  <div class="ld-msg" id="ld-msg">Finding your city…</div>
</div>

<!-- HUD Top -->
<div id="hud-top">
  <div>
    <div id="wordmark">Tootsie<em>Bootsie</em></div>
    <div id="city-line"><div id="city-dot"></div><span id="city-name">Locating…</span></div>
  </div>
  <div id="mode-toggle">
    <button class="mmode active" id="m-local" onclick="setMode('local')"><span class="mic">🏙️</span>Stay Local</button>
    <button class="mmode" id="m-trip"  onclick="setMode('trip')"><span class="mic">🚗</span>Day Trip</button>
    <button class="mmode" id="m-hike"  onclick="setMode('hike')"><span class="mic">🥾</span>Adventure</button>
  </div>
</div>

<!-- HUD Bottom -->
<div id="hud-bottom">
  <div id="gesture-guide">
    <div class="gest"><div class="gicon">👈</div><div class="glabel">Skip</div></div>
    <div class="gest"><div class="gicon">☝️</div><div class="glabel">Swap</div></div>
    <div class="gest"><div class="gicon">👉</div><div class="glabel">Save</div></div>
    <div class="gest"><div class="gicon">👇</div><div class="glabel">Details</div></div>
  </div>
  <div id="radius-bar">
    <button class="rpill" onclick="setRadius(30)">30 min</button>
    <button class="rpill active" onclick="setRadius(60)">1 hr</button>
    <button class="rpill" onclick="setRadius(120)">2 hrs</button>
  </div>
  <div id="saved-stack">
    <div id="saved-emojis"></div>
    <div id="saved-label">0 saved</div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Detail panel -->
<div id="detail-panel" id="detail-panel">
  <div id="detail-backdrop" onclick="closeDetail()"></div>
  <div id="detail-sheet">
    <div class="sheet-handle"></div>
    <div id="sheet-content"></div>
  </div>
</div>

<!-- Install banner -->
<div id="install-banner">
  <div class="ib-icon">🗺️</div>
  <div class="ib-text">
    <div class="ib-title">Add to Home Screen</div>
    <div class="ib-sub">Works offline · No App Store needed</div>
  </div>
  <button class="ib-btn" onclick="triggerInstall()">Install</button>
  <button class="ib-close" onclick="hideInstallBanner()">✕</button>
</div>

<!-- Trace composer -->
<div id="trace-composer">
  <div id="trace-bg" onclick="closeTraceComposer()"></div>
  <div id="trace-sheet">
    <div class="tc-handle"></div>
    <div class="tc-title">Leave a Trace</div>
    <div class="tc-place" id="tc-place-name"></div>
    <div id="tc-photo-area" onclick="document.getElementById('tc-file').click()">
      <img id="tc-photo-preview" src="" alt=""/>
      <div id="tc-photo-placeholder"><span>📸</span><small>Tap to add your photo</small></div>
    </div>
    <input id="tc-file" type="file" accept="image/*" style="display:none"/>
    <textarea id="tc-sentence" placeholder="One honest sentence about this place…" maxlength="120"></textarea>
    <div class="tc-char"><span id="tc-char-count">0</span>/120</div>
    <div class="tc-actions">
      <button class="tc-cancel" onclick="closeTraceComposer()">Cancel</button>
      <button class="tc-submit" id="tc-submit" onclick="submitTrace()" disabled>Leave Trace</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<script>

    { id:22, emoji:'🌲', name:'Uwharrie National Forest', type:'hike', color:'#3d5a8a', bg:'#edf1f8', why:'Ancient mountains, the oldest in North America. The trails feel genuinely remote despite being 90 minutes from Durham. Gold panning in the creek is a real thing.', tip:'The Dutchman\'s Creek trail is the best entry point. Download offline maps before you go.', tags:['Forest','Remote','Adventure'], buzz:.85, rating:4.7, dist:'1 hr 25 min', trail:{d:'6.2 mi',e:'+820 ft',diff:3} },

// ── State ─────────────────────────────────────────────────────────────────────
let mode = 'local';
let radius = 60;
let cityName = '';
let deck = [];          // active card data
let cardObjects = [];   // { mesh, data, el, state }
let savedPlaces = [];
let dragging = null;    // { obj, startX, startY, velX, velY, lastX, lastY }
let activeDetail = null;

// ── Three.js setup ────────────────────────────────────────────────────────────
const W = window.innerWidth, H = window.innerHeight;
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(W, H);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setClearColor(0x0e0b08, 1);
document.body.appendChild(renderer.domElement);
renderer.domElement.style.position = 'fixed';
renderer.domElement.style.inset = '0';
renderer.domElement.style.zIndex = '1';

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0e0b08, 0.045);

const camera = new THREE.PerspectiveCamera(55, W / H, 0.1, 100);
camera.position.set(0, 0, 7);

// Lights
scene.add(new THREE.AmbientLight(0xfff8f0, 0.5));
const key = new THREE.DirectionalLight(0xfff0e0, 1.2);
key.position.set(3, 6, 5); scene.add(key);
const fill = new THREE.DirectionalLight(0xc0d8ff, 0.4);
fill.position.set(-4, 2, 3); scene.add(fill);
const rimLight = new THREE.PointLight(0xe8845a, 0.6, 20);
rimLight.position.set(0, -3, -4); scene.add(rimLight);

// Background particles
buildParticles();

function buildParticles() {
  const geo = new THREE.BufferGeometry();
  const count = 200;
  const pos = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    pos[i*3]   = (Math.random() - .5) * 30;
    pos[i*3+1] = (Math.random() - .5) * 20;
    pos[i*3+2] = (Math.random() - .5) * 20 - 5;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const mat = new THREE.PointsMaterial({ color: 0xf5ede0, size: .04, transparent: true, opacity: .35 });
  scene.add(new THREE.Points(geo, mat));
}

// ── CSS3DRenderer ─────────────────────────────────────────────────────────────
// We use a DIV-overlay approach: position HTML cards using projected 3D coords
// This gives crisp text + true 3D physics feel without CSS3DRenderer complexity

const cardContainer = document.createElement('div');
cardContainer.style.cssText = 'position:fixed;inset:0;z-index:10;pointer-events:none;';
document.body.appendChild(cardContainer);

// ── Card positions ────────────────────────────────────────────────────────────
// 3 cards in a slight arc — center front, two behind and angled
const CARD_POSES = [
  { x: 0,    y: 0,    z: 0,    rx: -3,  ry: 0,   rz: 0   },  // front/center
  { x: -2.2, y: 0.3,  z: -1.5, rx: -5,  ry: 15,  rz: -4  },  // back left
  { x: 2.2,  y: -0.2, z: -1.5, rx: -5,  ry: -15, rz: 3   },  // back right
];

// ── Build card DOM element ────────────────────────────────────────────────────
function buildCardEl(data) {
  const div = document.createElement('div');
  div.className = 'card-face';
  const buzz = Math.round((data.buzz || .7) * 100);
  const isHike = data.type === 'hike';
  const isTrip = data.type === 'trip';

  let bottomHtml = '';
  if (isHike && data.trail) {
    const t = data.trail;
    const pips = '●'.repeat(t.diff) + '○'.repeat(5 - t.diff);
    bottomHtml = `
      <div style="display:flex;gap:6px;margin-bottom:8px">
        <div style="flex:1;background:${data.bg};border-radius:8px;padding:7px 6px;text-align:center">
          <div style="font-size:12px;font-weight:700;color:${data.color}">${t.d}</div>
          <div style="font-size:9px;color:var(--muted)">Distance</div>
        </div>
        <div style="flex:1;background:${data.bg};border-radius:8px;padding:7px 6px;text-align:center">
          <div style="font-size:12px;font-weight:700;color:${data.color}">${t.e}</div>
          <div style="font-size:9px;color:var(--muted)">Elevation</div>
        </div>
        <div style="flex:1;background:${data.bg};border-radius:8px;padding:7px 6px;text-align:center">
          <div style="font-size:11px;font-weight:700;color:${data.color}">${pips}</div>
          <div style="font-size:9px;color:var(--muted)">Difficulty</div>
        </div>
      </div>`;
  } else if (isTrip) {
    bottomHtml = `
      <div style="display:inline-flex;align-items:center;gap:5px;background:${data.bg};border-radius:12px;padding:5px 11px;margin-bottom:8px;font-size:11px;font-weight:600;color:${data.color}">
        🚗 ${data.dist}
      </div>`;
  } else {
    bottomHtml = `
      <div class="card-buzz-row">
        <span style="font-size:9px;color:var(--muted)">🔥</span>
        <div class="buzz-track"><div class="buzz-fill" style="width:${buzz}%;background:${data.color}"></div></div>
        <span style="font-size:9px;color:var(--muted);font-weight:600">${buzz}%</span>
      </div>`;
  }

  const typePillBg = data.type === 'local' ? '#fdf3ec' : data.type === 'trip' ? '#edf5f3' : '#edf1f8';
  div.innerHTML = `
    <div class="card-emoji" style="background:linear-gradient(160deg,${data.bg},#faf6ef)">${data.emoji}</div>
    <div class="card-content">
      <span class="card-type-pill" style="background:${typePillBg};color:${data.color}">
        ${data.type === 'local' ? 'Local Gem' : data.type === 'trip' ? 'Day Trip' : 'Trail'}
      </span>
      <div class="card-name">${data.name}</div>
      <div class="card-why">${data.why.length > 100 ? data.why.slice(0,100)+'…' : data.why}</div>
      ${bottomHtml}
      <div class="card-dist" style="color:var(--muted);font-size:10px">📍 ${data.dist || ''}</div>
    </div>
    <div class="swipe-hints">
      <div class="hint hint-left" id="hl-${data.id}">✕ Skip</div>
      <div class="hint hint-up" id="hu-${data.id}" style="top:12px;position:absolute;left:50%;transform:translateX(-50%)">↑ Swap</div>
      <div class="hint hint-right" id="hr-${data.id}">✓ Save</div>
    </div>`;
  return div;
}

// ── Project 3D → screen ───────────────────────────────────────────────────────
const _v3 = new THREE.Vector3();
function project3D(x, y, z) {
  _v3.set(x, y, z);
  _v3.project(camera);
  return {
    x: (_v3.x * .5 + .5) * window.innerWidth,
    y: (-.5 * _v3.y + .5) * window.innerHeight,
    z: _v3.z,
  };
}

// ── Card object factory ───────────────────────────────────────────────────────
function createCardObject(data, poseIdx) {
  const pose = CARD_POSES[poseIdx];
  const el = buildCardEl(data);
  el.style.pointerEvents = poseIdx === 0 ? 'all' : 'none';
  cardContainer.appendChild(el);

  // Invisible Three.js plane for raycasting / depth
  const geo = new THREE.PlaneGeometry(2.2, 3.1);
  const mat = new THREE.MeshBasicMaterial({ visible: false, side: THREE.DoubleSide });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(pose.x, pose.y, pose.z);
  mesh.rotation.set(
    THREE.MathUtils.degToRad(pose.rx),
    THREE.MathUtils.degToRad(pose.ry),
    THREE.MathUtils.degToRad(pose.rz)
  );
  scene.add(mesh);

  const obj = {
    data, el, mesh, poseIdx,
    // Current transform (animated)
    pos:  { x: pose.x, y: pose.y, z: pose.z },
    rot:  { x: pose.rx, y: pose.ry, z: pose.rz },
    // Target transform
    tPos: { x: pose.x, y: pose.y, z: pose.z },
    tRot: { x: pose.rx, y: pose.ry, z: pose.rz },
    // Velocity
    vel:  { x: 0, y: 0, z: 0 },
    // Scale
    scale: poseIdx === 0 ? 1 : 0.82,
    tScale: poseIdx === 0 ? 1 : 0.82,
    // State
    state: 'idle',  // idle | dragging | flying | entering
    opacity: 1,
    tOpacity: 1,
  };
  return obj;
}

// ── Init deck ─────────────────────────────────────────────────────────────────
function initDeck() {
  // Clear old
  cardObjects.forEach(obj => {
    scene.remove(obj.mesh);
    if (obj.el.parentNode) obj.el.parentNode.removeChild(obj.el);
  });
  cardObjects = [];

  const pool = getPool();
  deck = [...pool];

  // Show first 3
  for (let i = 0; i < Math.min(3, deck.length); i++) {
    const obj = createCardObject(deck[i], i);
    obj.state = 'entering';
    setTimeout(() => {
      obj.state = 'idle';
      obj.tOpacity = 1;
    }, i * 150 + 100);
    cardObjects.push(obj);
  }
}

function getPool() {
  if (mode === 'local') return DATA.local;
  if (mode === 'hike')  return DATA.hike;
  return DATA.trip.filter(t => t.driveMin <= radius);
}

// ── Position card visually ────────────────────────────────────────────────────
function positionCard(obj) {
  // Use the mesh's world position projected to screen
  // But we drive transforms directly for smooth physics
  const CARD_W = 300, CARD_H = 420;

  // Build transform string
  const tx = `
    translate(-50%, -50%)
    translate3d(${obj.pos.x * 90}px, ${-obj.pos.y * 90}px, 0)
    rotateX(${obj.rot.x}deg)
    rotateY(${obj.rot.y}deg)
    rotateZ(${obj.rot.z}deg)
    scale(${obj.scale})
  `;

  obj.el.style.left = '50%';
  obj.el.style.top  = '50%';
  obj.el.style.transform = tx;
  obj.el.style.opacity = obj.opacity;
  obj.el.style.zIndex = obj.poseIdx === 0 ? '15' : obj.poseIdx === 1 ? '13' : '12';
  obj.el.style.pointerEvents = (obj.poseIdx === 0 && obj.state === 'idle') ? 'all' : 'none';
}

// ── Animation loop ────────────────────────────────────────────────────────────
const SPRING = .14, DAMP = .72;

function lerp(a, b, t) { return a + (b - a) * t; }

function tick() {
  requestAnimationFrame(tick);
  const t = performance.now() * .001;

  // Animate rim light
  rimLight.intensity = .4 + Math.sin(t * .8) * .2;

  cardObjects.forEach(obj => {
    if (obj.state === 'dragging') return; // user controls it

    // Spring to target
    obj.vel.x = obj.vel.x * DAMP + (obj.tPos.x - obj.pos.x) * SPRING;
    obj.vel.y = obj.vel.y * DAMP + (obj.tPos.y - obj.pos.y) * SPRING;
    obj.pos.x += obj.vel.x;
    obj.pos.y += obj.vel.y;
    obj.pos.z  = lerp(obj.pos.z,  obj.tPos.z,  .12);
    obj.rot.x  = lerp(obj.rot.x,  obj.tRot.x,  .12);
    obj.rot.y  = lerp(obj.rot.y,  obj.tRot.y,  .12);
    obj.rot.z  = lerp(obj.rot.z,  obj.tRot.z,  .12);
    obj.scale  = lerp(obj.scale,  obj.tScale,  .12);
    obj.opacity= lerp(obj.opacity, obj.tOpacity,.1);

    // Gentle float for non-front cards
    if (obj.poseIdx !== 0) {
      obj.pos.y = obj.tPos.y + Math.sin(t * .7 + obj.poseIdx) * .06;
      obj.rot.z = obj.tRot.z + Math.sin(t * .5 + obj.poseIdx) * .5;
    }

    if (obj.state === 'flying') {
      if (Math.abs(obj.pos.x) > 12 || Math.abs(obj.pos.y) > 10 || obj.opacity < .05) {
        // Card has flown off — remove and advance deck
        removeCardAndAdvance(obj);
      }
    }

    positionCard(obj);
  });

  renderer.render(scene, camera);
}
tick();

// ── Touch / mouse interaction ─────────────────────────────────────────────────
function getFrontCard() { return cardObjects.find(o => o.poseIdx === 0 && o.state === 'idle'); }

function onPointerDown(e) {
  const fc = getFrontCard();
  if (!fc) return;
  const px = e.touches ? e.touches[0].clientX : e.clientX;
  const py = e.touches ? e.touches[0].clientY : e.clientY;
  // Check if touch is on card area (center of screen ±200px)
  const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
  if (Math.abs(px - cx) > 220 || Math.abs(py - cy) > 280) return;

  dragging = { obj: fc, startX: px, startY: py, lastX: px, lastY: py, velX: 0, velY: 0, startTime: Date.now() };
  fc.state = 'dragging';
  fc.el.style.transition = 'none';
  fc.el.style.cursor = 'grabbing';
}

function onPointerMove(e) {
  if (!dragging) return;
  e.preventDefault();
  const px = e.touches ? e.touches[0].clientX : e.clientX;
  const py = e.touches ? e.touches[0].clientY : e.clientY;

  const dx = px - dragging.startX;
  const dy = py - dragging.startY;

  dragging.velX = px - dragging.lastX;
  dragging.velY = py - dragging.lastY;
  dragging.lastX = px;
  dragging.lastY = py;

  const obj = dragging.obj;
  const POSE = CARD_POSES[0];

  // Move card with drag
  obj.pos.x = POSE.x + dx / 90;
  obj.pos.y = POSE.y - dy / 90;

  // Tilt based on horizontal drag
  obj.rot.z = POSE.rz - dx * .04;
  obj.rot.y = POSE.ry + dx * .02;
  obj.rot.x = POSE.rx + dy * .01;

  // Show action hints
  const absX = Math.abs(dx), absY = Math.abs(dy);
  const hl = document.getElementById('hl-' + obj.data.id);
  const hr = document.getElementById('hr-' + obj.data.id);
  const hu = document.getElementById('hu-' + obj.data.id);
  if (hl) hl.style.opacity = dx < -40 ? Math.min(1, (-dx - 40) / 60) : 0;
  if (hr) hr.style.opacity = dx > 40  ? Math.min(1, (dx - 40) / 60)  : 0;
  if (hu) hu.style.opacity = dy < -50 ? Math.min(1, (-dy - 50) / 60) : 0;
}

function onPointerUp(e) {
  if (!dragging) return;
  const obj = dragging.obj;
  const dx = obj.pos.x - CARD_POSES[0].x;
  const dy = obj.pos.y - CARD_POSES[0].y;
  const vx = dragging.velX;
  const vy = dragging.velY;
  const speed = Math.sqrt(vx*vx + vy*vy);
  const elapsed = Date.now() - dragging.startTime;

  dragging = null;
  obj.el.style.cursor = 'grab';

  // Determine action from position + velocity
  const isTap = speed < 3 && elapsed < 250 && Math.abs(dx) < .3 && Math.abs(dy) < .3;

  if (isTap) {
    // Tap = show detail
    snapBack(obj);
    showDetail(obj.data);
    return;
  }

  const THRESH = .7;
  const VTHRESH = 4;

  if (dx < -THRESH || vx < -VTHRESH) {
    flyAway(obj, 'left');
  } else if (dx > THRESH || vx > VTHRESH) {
    flyAway(obj, 'right');
  } else if (dy > THRESH || vy > VTHRESH) {
    // Swipe down — show detail
    snapBack(obj);
    showDetail(obj.data);
  } else if (dy < -THRESH || vy < -VTHRESH) {
    flyAway(obj, 'up');
  } else {
    snapBack(obj);
  }
}

function snapBack(obj) {
  obj.state = 'idle';
  const pose = CARD_POSES[0];
  obj.tPos = { x: pose.x, y: pose.y, z: pose.z };
  obj.tRot = { x: pose.rx, y: pose.ry, z: pose.rz };
  // Clear hints
  ['hl','hr','hu'].forEach(p => {
    const el = document.getElementById(p + '-' + obj.data.id);
    if (el) el.style.opacity = 0;
  });
}

function flyAway(obj, dir) {
  obj.state = 'flying';
  obj.tOpacity = 0;
  const action = dir === 'right' ? 'save' : dir === 'left' ? 'skip' : 'swap';

  if (dir === 'left')  { obj.tPos.x = -12; obj.tRot.z = -30; obj.tRot.y = -20; }
  if (dir === 'right') { obj.tPos.x = 12;  obj.tRot.z = 30;  obj.tRot.y = 20; }
  if (dir === 'up')    { obj.tPos.y = 10;  obj.tRot.x = -30; }

  if (action === 'save') {
    if (!savedPlaces.find(p => p.id === obj.data.id)) {
      savedPlaces.push(obj.data);
      updateSavedStack();
      toast('✓ Saved — ' + obj.data.name);
    }
  } else if (action === 'skip') {
    toast('Skipped');
  } else {
    toast('♻️ Swapping…');
  }
}

function removeCardAndAdvance(obj) {
  // Remove from scene
  scene.remove(obj.mesh);
  if (obj.el.parentNode) obj.el.parentNode.removeChild(obj.el);
  cardObjects = cardObjects.filter(o => o !== obj);

  // Promote back cards forward
  cardObjects.forEach((o, i) => {
    const newPoseIdx = i;
    const pose = CARD_POSES[newPoseIdx];
    o.poseIdx = newPoseIdx;
    o.tPos = { x: pose.x, y: pose.y, z: pose.z };
    o.tRot = { x: pose.rx, y: pose.ry, z: pose.rz };
    o.tScale = newPoseIdx === 0 ? 1 : 0.82;
  });

  // Pull next from deck
  const usedIds = cardObjects.map(o => o.data.id);
  const savedIds = savedPlaces.map(p => p.id);
  const pool = getPool();
  const next = pool.find(p => !usedIds.includes(p.id) && !savedIds.includes(p.id))
             || pool.find(p => !usedIds.includes(p.id));

  if (next) {
    const newObj = createCardObject(next, 2);
    newObj.pos  = { x: CARD_POSES[2].x, y: CARD_POSES[2].y - 2, z: CARD_POSES[2].z - 1 };
    newObj.tPos = { ...CARD_POSES[2] };
    newObj.opacity = 0; newObj.tOpacity = 1;
    newObj.scale = .82; newObj.tScale = .82;
    newObj.state = 'entering';
    setTimeout(() => newObj.state = 'idle', 400);
    cardObjects.push(newObj);
  } else if (!cardObjects.length) {
    toast('You\'ve seen everything nearby! 🎉');
  }
}

// ── Detail panel ──────────────────────────────────────────────────────────────
// showDetail is defined in the Traces section below

window.sheetSave = function(id) {
  const data = [...DATA.local, ...DATA.trip, ...DATA.hike].find(d => d.id === id);
  if (!data) return;
  if (!savedPlaces.find(p => p.id === id)) {
    savedPlaces.push(data);
    updateSavedStack();
    toast('✓ Saved — ' + data.name);
  }
  closeDetail();
};

window.closeDetail = function() {
  document.getElementById('detail-panel').classList.remove('open');
};

// ── Saved stack ───────────────────────────────────────────────────────────────
function updateSavedStack() {
  const stack = document.getElementById('saved-stack');
  const emojis = document.getElementById('saved-emojis');
  const label = document.getElementById('saved-label');
  if (!savedPlaces.length) { stack.classList.remove('visible'); return; }
  stack.classList.add('visible');
  emojis.innerHTML = savedPlaces.slice(-4).map(p =>
    `<div class="saved-emoji">${p.emoji}</div>`
  ).join('');
  label.textContent = savedPlaces.length + ' saved';
}



// ── Mode & radius set by API-aware versions below ─────────────────────────────

// ── API base (empty = same origin on Vercel) ─────────────────────────────────
const API = window.API_BASE || '';

// ── Live data fetch ───────────────────────────────────────────────────────────
let userLat = null, userLng = null, userState = '';

async function fetchDiscoveries(m, r) {
  if (!userLat || !API) return null;
  try {
    const res = await fetch(`${API}/api/discover`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        lat: userLat, lng: userLng,
        city: cityName, state: userState,
        mode: m, radius: r,
        travel_date: new Date().toISOString().split('T')[0],
        count: 6,
      })
    });
    if (!res.ok) return null;
    const data = await res.json();
    return data.places?.length ? data.places : null;
  } catch(e) { return null; }
}

async function fetchDayTrips(r) {
  if (!userLat || !API) return null;
  try {
    const res = await fetch(`${API}/api/day-trips`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        lat: userLat, lng: userLng,
        city: cityName, state: userState,
        mode: 'trip', radius: r,
        count: 5,
      })
    });
    if (!res.ok) return null;
    const data = await res.json();
    return data.places?.length ? data.places : null;
  } catch(e) { return null; }
}

async function fetchTrails() {
  if (!userLat) return null;
  try {
    const res = await fetch(`${API}/api/trails?lat=${userLat}&lng=${userLng}`);
    if (!res.ok) return null;
    const data = await res.json();
    return data?.length ? data : null;
  } catch(e) { return null; }
}

// Enrich fallback data with real Google photos via API
function enrichFallbackWithAPI(fallbackData, apiData) {
  if (!apiData?.length) return fallbackData;
  return fallbackData.map((card, i) => ({
    ...card,
    ...(apiData[i] ? {
      photo_url: apiData[i].photo_url || card.photo_url,
      rating: apiData[i].rating || card.rating,
      open_now: apiData[i].open_now,
      address: apiData[i].address || card.address,
    } : {})
  }));
}

// ── Mode switching (now API-aware) ────────────────────────────────────────────
window.setMode = async function(m) {
  mode = m;
  ['local','trip','hike'].forEach(id => {
    document.getElementById('m-'+id).className = 'mmode' + (m===id?' active':'');
  });
  document.getElementById('radius-bar').className = m === 'trip' ? 'visible' : '';

  // Show fallback data immediately
  initDeck();

  // Then try to replace with real API data
  if (userLat && API) {
    let apiData = null;
    if (m === 'local') apiData = await fetchDiscoveries('local', 60);
    if (m === 'trip')  apiData = await fetchDayTrips(radius);
    if (m === 'hike')  apiData = await fetchTrails();
    if (apiData) {
      // Reload deck with real data
      const pool = getPool();
      DATA[m] = apiData.map((p, i) => ({
        ...pool[i % pool.length], // keep fallback structure
        ...p,                     // override with real data
        id: p.id || (m === 'local' ? i+1 : m === 'trip' ? i+10 : i+20),
        type: m,
        color: m === 'local' ? '#c45c2e' : m === 'trip' ? '#2e6b5e' : '#3d5a8a',
        bg: m === 'local' ? '#fdf3ec' : m === 'trip' ? '#edf5f3' : '#edf1f8',
      }));
      initDeck();
      toast('✨ Real discoveries loaded!');
    }
  }
};

window.setRadius = async function(r) {
  radius = r;
  document.querySelectorAll('.rpill').forEach(p => {
    const v = p.textContent.includes('30') ? 30 : p.textContent.includes('1') ? 60 : 120;
    p.className = 'rpill' + (v === r ? ' active' : '');
  });
  initDeck();
  if (userLat && API) {
    const apiData = await fetchDayTrips(r);
    if (apiData) {
      DATA.trip = apiData.map((p, i) => ({
        ...DATA.trip[i % DATA.trip.length],
        ...p, id: p.id || i+10, type: 'trip',
        color: '#2e6b5e', bg: '#edf5f3',
      }));
      initDeck();
    }
  }
};

// ── Toast ─────────────────────────────────────────────────────────────────────
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.classList.remove('show'), 2200);
}

// ── Window resize ─────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
});

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  const msgs = [
    'Asking the locals…',
    'Checking what\'s on today…',
    'Finding hidden gems…',
    'Curating your day…',
    'Almost there…',
  ];
  let mi = 0;
  const iv = setInterval(() => {
    document.getElementById('ld-msg').textContent = msgs[mi++ % msgs.length];
  }, 1100);

  // Show fallback deck immediately so app feels instant
  initDeck();

  // GUARANTEED fallback — always dismiss loading after 8 seconds no matter what
  const maxWait = setTimeout(() => {
    clearInterval(iv);
    hideLanding();
    toast('💡 Demo mode — enable location for real discoveries');
  }, 8000);

  // Get location
  if (!navigator.geolocation) {
    document.getElementById('city-name').textContent = 'TootsieBootsie';
    clearInterval(iv);
    clearTimeout(maxWait);
    hideLanding();
    return;
  }

  navigator.geolocation.getCurrentPosition(async pos => {
    clearTimeout(maxWait); // cancel the fallback timer
    userLat = pos.coords.latitude;
    userLng = pos.coords.longitude;

    // City name — try our API first, fall back to Nominatim directly
    try {
      if (API) {
        const geo = await fetch(`${API}/api/geocode?lat=${userLat}&lng=${userLng}`).then(r=>r.json());
        cityName = geo.city || 'Your City';
        userState = geo.state || '';
      } else {
        const r = await fetch(
          `https://nominatim.openstreetmap.org/reverse?lat=${userLat}&lon=${userLng}&format=json&zoom=10`,
          { headers: {'User-Agent':'TootsieBootsie/2.0'} }
        );
        const d = await r.json();
        const a = d.address || {};
        cityName = a.city || a.town || a.village || a.county || 'Your City';
        userState = a.state || '';
      }
      document.getElementById('city-name').textContent = cityName;
    } catch(e) {
      document.getElementById('city-name').textContent = 'Location found';
    }

    // Fetch real discoveries from Claude
    clearInterval(iv);
    document.getElementById('ld-msg').textContent = `Discovering ${cityName}…`;

    const [localData, tripData, trailData] = await Promise.allSettled([
      fetchDiscoveries('local', 60),
      fetchDayTrips(radius),
      fetchTrails(),
    ]);

    // Update DATA with real results
    if (localData.value) {
      DATA.local = localData.value.map((p, i) => ({
        ...DATA.local[i % DATA.local.length],
        ...p, id: p.id || i+1, type: 'local',
        color: '#c45c2e', bg: '#fdf3ec',
      }));
    }
    if (tripData.value) {
      DATA.trip = tripData.value.map((p, i) => ({
        ...DATA.trip[i % DATA.trip.length],
        ...p, id: p.id || i+10, type: 'trip',
        color: '#2e6b5e', bg: '#edf5f3',
      }));
    }
    if (trailData.value) {
      DATA.hike = trailData.value.map((p, i) => ({
        ...DATA.hike[i % DATA.hike.length],
        ...p, id: p.id || i+20, type: 'hike',
        color: '#3d5a8a', bg: '#edf1f8',
      }));
    }

    // Reload deck with real data
    initDeck();
    hideLanding();

    const hasReal = localData.value || tripData.value || trailData.value;
    if (hasReal) {
      setTimeout(() => toast(`✨ Real discoveries for ${cityName}!`), 400);
    } else {
      setTimeout(() => toast('💡 Demo mode — add API keys for real discoveries'), 400);
    }

  }, () => {
    clearTimeout(maxWait);
    clearInterval(iv);
    document.getElementById('city-name').textContent = 'Enable location';
    hideLanding();
    toast('📍 Enable location for real nearby discoveries');
  }, { enableHighAccuracy: true, timeout: 10000 });
}

function hideLanding() {
  const ls = document.getElementById('loading-screen');
  ls.classList.add('out');
  setTimeout(() => {
    ls.style.display = 'none';
    // Handle ?mode= from PWA manifest shortcuts
    if (window._initialMode) setMode(window._initialMode);
  }, 700);
}

// ═══════════════════════════════════════════════════════════
// TRACES — Social Layer
// ═══════════════════════════════════════════════════════════

// Config — set these in your deployment
const SUPABASE_URL  = window.SUPABASE_URL  || '';
const SUPABASE_ANON = window.SUPABASE_ANON || '';

let supabase = null;
let currentUser = null;
let userJwt = null;
let traceTarget = null;   // { place_name, place_type, lat, lng }
let tcPhotoFile = null;

// Init Supabase
function initSupabase() {
  if (!SUPABASE_URL || !SUPABASE_ANON) return;
  supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
  // Listen for auth changes
  supabase.auth.onAuthStateChange((event, session) => {
    currentUser = session?.user || null;
    userJwt = session?.access_token || null;
    updateAuthUI();
  });
  // Restore session
  supabase.auth.getSession().then(({ data }) => {
    currentUser = data.session?.user || null;
    userJwt = data.session?.access_token || null;
    updateAuthUI();
  });
}

function updateAuthUI() {
  const btn = document.getElementById('auth-btn');
  const lbl = document.getElementById('auth-label');
  const avatar = document.getElementById('auth-avatar');
  if (currentUser) {
    lbl.textContent = currentUser.user_metadata?.full_name?.split(' ')[0] || 'You';
    const av = currentUser.user_metadata?.avatar_url;
    if (av) { avatar.src = av; avatar.style.display = 'block'; }
  } else {
    lbl.textContent = 'Sign in'; avatar.style.display = 'none';
  }
}

window.handleAuth = async function() {
  if (!supabase) {
    toast('Sign in available in the deployed app');
    return;
  }
  if (currentUser) {
    await supabase.auth.signOut();
    toast('Signed out');
  } else {
    await supabase.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: window.location.href }
    });
  }
};

// ── Trace wall in detail sheet ────────────────────────────────
function buildTracesSection(data) {
  const traces = data.traces || [];
  const hasTraces = traces.length > 0;
  const wallHtml = hasTraces
    ? `<div class="traces-wall">
        ${traces.slice(0,6).map(t =>
          `<img class="trace-thumb" src="${t.photo_url}" alt="${t.sentence}"
           onclick="viewTrace('${t.id}')" loading="lazy"
           onerror="this.style.display='none'">`
        ).join('')}
        ${traces.length < 6 ? `<div class="trace-thumb-empty" onclick="openTraceComposer('${data.name}','${data.type}')">+</div>` : ''}
       </div>`
    : `<div class="traces-wall">
        <div class="trace-thumb-empty" onclick="openTraceComposer('${data.name}','${data.type}')">📸</div>
        <div class="trace-thumb-empty" style="opacity:.4">📸</div>
        <div class="trace-thumb-empty" style="opacity:.2">📸</div>
       </div>`;

  const countTxt = hasTraces
    ? `<strong>${traces.length}</strong> trace${traces.length!==1?'s':''} from real visitors`
    : 'Be the first to leave a Trace here';

  return `
    <div style="border-top:1px solid var(--border);padding-top:14px;margin-top:4px">
      <div class="trace-count">📍 ${countTxt}</div>
      ${wallHtml}
      <button class="btn-trace" onclick="openTraceComposer('${data.name}','${data.type}')">
        + Leave a Trace — one photo, one sentence
      </button>
    </div>`;
}

// ── Open / close trace composer ───────────────────────────────
window.openTraceComposer = function(placeName, placeType) {
  if (!currentUser && supabase) {
    toast('Sign in to leave a Trace');
    handleAuth();
    return;
  }
  traceTarget = { place_name: placeName, place_type: placeType || 'local',
                  lat: userLat || 0, lng: userLng || 0 };
  document.getElementById('tc-place-name').textContent = placeName;
  document.getElementById('tc-sentence').value = '';
  document.getElementById('tc-char-count').textContent = '0';
  document.getElementById('tc-submit').disabled = true;
  document.getElementById('tc-photo-preview').style.display = 'none';
  document.getElementById('tc-photo-placeholder').style.display = 'flex';
  tcPhotoFile = null;
  document.getElementById('trace-composer').classList.add('open');
  // Close detail panel behind it
  document.getElementById('detail-panel').classList.remove('open');
};

window.closeTraceComposer = function() {
  document.getElementById('trace-composer').classList.remove('open');
};

// Photo selection
document.getElementById('tc-file').addEventListener('change', e => {
  const file = e.target.files[0]; if (!file) return;
  tcPhotoFile = file;
  const url = URL.createObjectURL(file);
  const preview = document.getElementById('tc-photo-preview');
  preview.src = url; preview.style.display = 'block';
  document.getElementById('tc-photo-placeholder').style.display = 'none';
  checkTraceReady();
  e.target.value = '';
});

// Sentence input
document.getElementById('tc-sentence').addEventListener('input', e => {
  const len = e.target.value.length;
  document.getElementById('tc-char-count').textContent = len;
  checkTraceReady();
});

function checkTraceReady() {
  const sentence = document.getElementById('tc-sentence').value.trim();
  const hasPhoto = !!tcPhotoFile;
  const hasText = sentence.length >= 5;
  document.getElementById('tc-submit').disabled = !(hasPhoto && hasText);
}

// ── Submit trace ──────────────────────────────────────────────
window.submitTrace = async function() {
  const sentence = document.getElementById('tc-sentence').value.trim();
  if (!tcPhotoFile || !sentence || !traceTarget) return;

  const btn = document.getElementById('tc-submit');
  btn.disabled = true; btn.textContent = 'Leaving trace…';

  try {
    // 1. Create trace record via API
    const traceRes = await fetch(`${API}/api/traces`, {
      method: 'POST',
      headers: { 'Content-Type':'application/json',
                 'Authorization': userJwt ? `Bearer ${userJwt}` : '' },
      body: JSON.stringify({ ...traceTarget, sentence })
    });

    if (!traceRes.ok) {
      // Demo mode — no backend
      toast('✨ Trace saved! (Connect backend to persist)');
      closeTraceComposer();
      return;
    }

    const { trace_id } = await traceRes.json();

    // 2. Upload photo
    const formData = new FormData();
    formData.append('file', tcPhotoFile);
    const photoRes = await fetch(`${API}/api/traces/${trace_id}/photo`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${userJwt}` },
      body: formData
    });

    if (photoRes.ok) {
      toast('✨ Trace left! Others will see it here.');
    } else {
      toast('Trace saved — photo upload failed');
    }
    closeTraceComposer();

  } catch(e) {
    console.error(e);
    toast('Could not save trace — try again');
    btn.disabled = false; btn.textContent = 'Leave Trace';
  }
};

// ── View single trace ─────────────────────────────────────────
window.viewTrace = function(traceId) {
  toast('Trace viewer coming soon!');
};

// ── Updated showDetail with Traces section ────────────────────
function showDetail(data) {
  activeDetail = data;
  const saved = savedPlaces.find(p => p.id === data.id);
  const tags = (data.tags||[]).map(t => `<span class="sheet-tag">${t}</span>`).join('');
  const tracesHtml = buildTracesSection(data);
  document.getElementById('sheet-content').innerHTML = `
    <div style="font-size:48px;text-align:center;margin-bottom:12px">${data.emoji}</div>
    <div class="sheet-name">${data.name}</div>
    <div class="sheet-why">${data.why}</div>
    <div class="sheet-tip">${data.tip}</div>
    <div class="sheet-tags">${tags}</div>
    ${tracesHtml}
    <div class="sheet-actions" style="margin-top:14px">
      <button class="sheet-save ${saved?'saved':''}" onclick="sheetSave(${data.id})">${saved?'✓ Saved to My Day':'+ Save to My Day'}</button>
      <button class="sheet-dismiss" onclick="closeDetail()">✕</button>
    </div>`;
  document.getElementById('detail-panel').classList.add('open');
}

window.addEventListener('load', () => {
  initSupabase();
  init();
  registerSW();
  initInstallPrompt();
});

// ── Service Worker registration ───────────────────────────────
function registerSW() {
  if (!('serviceWorker' in navigator)) return;
  navigator.serviceWorker.register('/sw.js')
    .then(reg => {
      console.log('[PWA] Service worker registered:', reg.scope);
      // Check for updates
      reg.addEventListener('updatefound', () => {
        const newWorker = reg.installing;
        newWorker.addEventListener('statechange', () => {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            toast('App updated — refresh for the latest version');
          }
        });
      });
    })
    .catch(err => console.log('[PWA] SW registration failed:', err));
}

// ── Install prompt (Add to Home Screen) ──────────────────────
let deferredInstallPrompt = null;

function initInstallPrompt() {
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredInstallPrompt = e;
    // Show install hint after 30 seconds if not already installed
    setTimeout(() => {
      if (deferredInstallPrompt && !isInstalled()) {
        showInstallBanner();
      }
    }, 30000);
  });

  window.addEventListener('appinstalled', () => {
    deferredInstallPrompt = null;
    toast('✓ TootsieBootsie installed!');
    hideInstallBanner();
  });

  // Handle ?mode= URL param from manifest shortcuts
  const params = new URLSearchParams(window.location.search);
  const modeParam = params.get('mode');
  if (modeParam && ['local','trip','hike'].includes(modeParam)) {
    // Will be picked up after init completes
    window._initialMode = modeParam;
  }
}

function isInstalled() {
  return window.matchMedia('(display-mode: standalone)').matches ||
         window.navigator.standalone === true;
}

function showInstallBanner() {
  const banner = document.getElementById('install-banner');
  if (banner) banner.classList.add('visible');
}

function hideInstallBanner() {
  const banner = document.getElementById('install-banner');
  if (banner) banner.classList.remove('visible');
}

window.triggerInstall = async function() {
  if (!deferredInstallPrompt) {
    toast('Open in Chrome/Safari and use "Add to Home Screen"');
    return;
  }
  deferredInstallPrompt.prompt();
  const { outcome } = await deferredInstallPrompt.userChoice;
  if (outcome === 'accepted') toast('Installing TootsieBootsie…');
  deferredInstallPrompt = null;
  hideInstallBanner();
};
